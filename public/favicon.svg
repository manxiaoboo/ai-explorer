<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e07a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f4a261;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#e07a5f" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Organic rounded rectangle with warm gradient -->
  <rect width="32" height="32" rx="10" fill="url(#warmGrad)" filter="url(#softShadow)"/>
  <!-- Letter 'a' with organic feel -->
  <text x="16" y="23" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="19" font-weight="700" text-anchor="middle" fill="white" style="letter-spacing: -0.5px;">a</text>
</svg>
